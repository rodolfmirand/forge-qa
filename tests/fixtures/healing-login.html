<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forge QA Healing Fixture</title>
    <style>
      body {
        font-family: Georgia, "Times New Roman", serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f2ebe2, #dfe8d3);
      }

      main {
        width: min(92vw, 420px);
        padding: 28px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 60px rgba(35, 29, 24, 0.12);
      }

      h1 {
        margin-top: 0;
      }

      label,
      .action {
        display: block;
        margin-top: 16px;
      }

      input {
        width: 100%;
        margin-top: 8px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #c9bbaa;
      }

      .action {
        padding: 14px 16px;
        border-radius: 999px;
        background: #1c4c4c;
        color: #f5f1eb;
        text-align: center;
        cursor: pointer;
        user-select: none;
      }

      #result {
        margin-top: 18px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Second Mind Workspace</h1>
      <p>This fixture intentionally avoids a regular submit button to trigger selector healing.</p>
      <label>
        Email
        <input id="email" name="email" type="email" autocomplete="username" />
      </label>
      <label>
        Password
        <input id="password" name="password" type="password" autocomplete="current-password" />
      </label>
      <div
        id="submit-authentication-form"
        class="action"
        role="button"
        data-testid="workspace-entry"
        tabindex="0"
      >
        Open workspace
      </div>
      <section id="result">Waiting</section>
    </main>

    <script>
      const action = document.getElementById("submit-authentication-form");
      const result = document.getElementById("result");

      const completeLogin = () => {
        result.textContent = "Dashboard";
      };

      action.addEventListener("click", completeLogin);
      action.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          completeLogin();
        }
      });
    </script>
  </body>
</html>
